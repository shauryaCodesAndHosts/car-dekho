<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CarDekho — AI Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #F7F6F2;
    --surface:  #FFFFFF;
    --border:   #E4E2DC;
    --text:     #1A1814;
    --muted:    #7A7772;
    --faint:    #AFACA6;
    --accent:   #C17820;
    --accent-bg:#FDF3E3;
    --tag-bg:   #EEECEA;
    --tag-text: #5A5750;
    --chip-bg:  #F0EEE9;
    --radius:   10px;
    --chat-max: 720px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
  }
  .logo {
    display: flex; align-items: center; gap: 9px;
    font-size: 15px; font-weight: 500; letter-spacing: -0.02em; color: var(--text);
    text-decoration: none;
  }
  .logo-icon {
    width: 26px; height: 26px; background: var(--text);
    border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo span { color: var(--accent); font-weight: 300; }
  .header-tag {
    font-size: 11px; color: var(--faint); letter-spacing: 0.06em;
    text-transform: uppercase; font-weight: 400;
  }

  /* ── Chat scroll area ── */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px;
    scroll-behavior: smooth;
  }
  #chat-inner {
    max-width: var(--chat-max);
    margin: 0 auto;
    padding: 32px 0 20px;
    display: flex; flex-direction: column; gap: 0;
  }

  /* ── Empty state ── */
  #empty-state {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 60px 20px 0;
    animation: fadeUp 0.4s ease forwards;
  }
  .empty-icon {
    width: 48px; height: 48px; background: var(--text);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  #empty-state h1 {
    font-size: 22px; font-weight: 500; letter-spacing: -0.03em;
    color: var(--text); margin-bottom: 8px; line-height: 1.3;
  }
  #empty-state p {
    font-size: 14px; color: var(--muted); line-height: 1.65;
    max-width: 380px; margin-bottom: 32px; font-weight: 300;
  }
  .suggestions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 8px; width: 100%; max-width: 560px;
  }
  .suggestion-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    font-size: 13px; color: var(--tag-text); cursor: pointer;
    text-align: left; line-height: 1.45; font-family: inherit;
    transition: background 0.12s, border-color 0.12s;
  }
  .suggestion-chip:hover { background: var(--chip-bg); border-color: #CCC9C2; }

  /* ── Messages ── */
  .msg-user {
    display: flex; justify-content: flex-end;
    margin-bottom: 18px; animation: fadeUp 0.25s ease forwards;
  }
  .msg-user-bubble {
    max-width: 68%;
    background: var(--text); color: #F5F3EE;
    border-radius: 14px 14px 3px 14px;
    padding: 10px 15px; font-size: 14px; line-height: 1.55;
  }

  .msg-assistant { margin-bottom: 28px; animation: fadeUp 0.3s ease forwards; }

  .filter-row {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
  }
  .filter-pill {
    font-size: 11px; padding: 3px 9px;
    background: var(--accent-bg); color: var(--accent);
    border: 1px solid #EDD49A;
    border-radius: 20px; font-weight: 500;
  }

  .recommendation-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px 14px 14px 14px;
    padding: 16px 18px; font-size: 14px;
    line-height: 1.75; color: #2C2A26;
    margin-bottom: 18px; white-space: pre-wrap;
    font-weight: 300;
  }

  .shortlist-label {
    font-size: 10px; color: var(--faint);
    text-transform: uppercase; letter-spacing: 0.09em;
    font-weight: 500; margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  .cars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }

  .car-card {
    background: #FAFAF8; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 14px;
    display: flex; flex-direction: column; gap: 9px;
  }
  .car-name {
    font-size: 13px; font-weight: 500;
    color: var(--text); letter-spacing: -0.01em; line-height: 1.3;
  }
  .car-price {
    font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 1px;
  }
  .car-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .car-tag {
    font-size: 10px; padding: 2px 7px;
    background: var(--tag-bg); color: var(--tag-text);
    border-radius: 20px; font-weight: 500; letter-spacing: 0.01em;
  }
  .car-meta {
    font-size: 11px; color: var(--faint);
    display: flex; gap: 10px; font-family: 'DM Mono', monospace;
  }
  .star-row {
    display: flex; align-items: center; gap: 3px;
  }
  .star { font-size: 10px; }
  .star-val { font-size: 11px; color: var(--muted); margin-left: 3px; font-family: 'DM Mono', monospace; }

  /* ── Error ── */
  .msg-error {
    background: #FEF2F2; border: 1px solid #FCCFCF;
    border-radius: var(--radius); padding: 12px 15px;
    font-size: 13px; color: #8A2020;
    margin-bottom: 20px; animation: fadeUp 0.25s ease forwards;
  }

  /* ── Typing indicator ── */
  #typing {
    display: none; align-items: center; gap: 5px; margin-bottom: 20px;
    animation: fadeUp 0.2s ease forwards;
  }
  #typing.visible { display: flex; }
  .dot {
    width: 6px; height: 6px; background: var(--border);
    border-radius: 50%; animation: bounce 1.1s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }

  /* ── Input bar ── */
  #input-bar {
    background: var(--bg);
    padding: 12px 16px 20px;
    position: sticky; bottom: 0;
  }
  #input-wrap {
    max-width: var(--chat-max); margin: 0 auto;
    background: var(--surface); border: 1px solid #CCC9C2;
    border-radius: 13px;
    display: flex; align-items: flex-end; gap: 8px;
    padding: 9px 10px 9px 15px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(193,120,32,0.12);
  }
  #query-input {
    flex: 1; resize: none; border: none; background: transparent;
    font-family: inherit; font-size: 14px; font-weight: 300;
    color: var(--text); line-height: 1.6;
    max-height: 110px; overflow-y: auto;
  }
  #query-input::placeholder { color: var(--faint); }
  #query-input:focus { outline: none; }
  #send-btn {
    width: 34px; height: 34px; flex-shrink: 0;
    border: none; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    background: var(--text);
    transition: background 0.12s, transform 0.1s;
  }
  #send-btn:hover:not(:disabled) { background: #3A3630; }
  #send-btn:active:not(:disabled) { transform: scale(0.95); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }
  #hint {
    text-align: center; font-size: 11px; color: var(--faint);
    margin-top: 7px; letter-spacing: 0.01em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-5px); }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 10L5 5l2.5 3L10 3l2.5 4" stroke="#C17820" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="10.5" r="1.2" fill="#C17820"/>
        <circle cx="3" cy="10.5" r="1.2" fill="#C17820"/>
      </svg>
    </div>
    CarDekho <span>&nbsp;AI Advisor</span>
  </a>
  <span class="header-tag">Groq · Cohere · Pinecone</span>
</header>

<div id="chat-area">
  <div id="chat-inner">

    <div id="empty-state">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M3 16L7 7l4 5.5L15 4l4 7" stroke="#C17820" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="19" cy="17" r="2" fill="#C17820"/>
          <circle cx="4"  cy="17" r="2" fill="#C17820"/>
        </svg>
      </div>
      <h1>Find your next car</h1>
      <p>Describe what you want — budget, body type, fuel, family size — and get a personalised shortlist in seconds.</p>
      <div class="suggestions" id="suggestions">
        <button class="suggestion-chip">SUV under 15 lakhs, automatic petrol, 5 seats</button>
        <button class="suggestion-chip">Best diesel MPV for family of 7, budget 25 lakhs</button>
        <button class="suggestion-chip">First car under 8 lakhs, low maintenance, city use</button>
        <button class="suggestion-chip">Powerful hatchback, good mileage, under 10 lakhs</button>
      </div>
    </div>

    <div id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

  </div>
</div>

<div id="input-bar">
  <div id="input-wrap">
    <textarea id="query-input" rows="1" placeholder="Describe the car you're looking for…"></textarea>
    <button id="send-btn" disabled aria-label="Send">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1.5 12.5L12.5 7 1.5 1.5V5.8L9 7l-7.5 1.2V12.5Z" fill="white"/>
      </svg>
    </button>
  </div>
  <p id="hint">Enter to send · Shift+Enter for new line</p>
</div>

<script>
(function () {
  const chatInner   = document.getElementById('chat-inner');
  const emptyState  = document.getElementById('empty-state');
  const typingEl    = document.getElementById('typing');
  const input       = document.getElementById('query-input');
  const sendBtn     = document.getElementById('send-btn');
  const suggestions = document.getElementById('suggestions');

  let loading = false;

  // ── helpers ──────────────────────────────────────────────────────────────

  function formatPrice(n) {
    if (n >= 10000000) return '₹' + (n / 10000000).toFixed(1) + ' Cr';
    if (n >= 100000)   return '₹' + (n / 100000).toFixed(1) + ' L';
    return '₹' + n.toLocaleString('en-IN');
  }

  function stars(rating) {
    let s = '';
    for (let i = 1; i <= 5; i++) {
      s += `<span class="star" style="color:${i <= Math.round(rating) ? '#C17820' : '#D8D4CC'}">★</span>`;
    }
    return `<div class="star-row">${s}<span class="star-val">${rating.toFixed(1)}</span></div>`;
  }

  function scrollBottom() {
    const area = document.getElementById('chat-area');
    area.scrollTop = area.scrollHeight;
  }

  function hideEmpty() {
    if (emptyState) emptyState.style.display = 'none';
  }

  // ── render functions ──────────────────────────────────────────────────────

  function appendUserMsg(text) {
    hideEmpty();
    const div = document.createElement('div');
    div.className = 'msg-user';
    div.innerHTML = `<div class="msg-user-bubble">${escHtml(text)}</div>`;
    chatInner.insertBefore(div, typingEl);
    scrollBottom();
  }

  function appendError(msg) {
    const div = document.createElement('div');
    div.className = 'msg-error';
    div.textContent = msg;
    chatInner.insertBefore(div, typingEl);
    scrollBottom();
  }

  function appendAssistant(data) {
    const { recommendation, cars, extracted_filters } = data;

    const activeFilters = Object.entries(extracted_filters || {})
      .filter(([, v]) => v !== null && v !== undefined);

    const filterHTML = activeFilters.length
      ? `<div class="filter-row">${
          activeFilters.map(([k, v]) => {
            const label = k.replace(/_/g, ' ');
            const val = (typeof v === 'number' && v > 100000) ? formatPrice(v) : v;
            return `<span class="filter-pill">${label}: ${val}</span>`;
          }).join('')
        }</div>`
      : '';

    const carsHTML = (cars && cars.length)
      ? `<p class="shortlist-label">Your shortlist &middot; ${cars.length} cars</p>
         <div class="cars-grid">${cars.map(carCardHTML).join('')}</div>`
      : '';

    const div = document.createElement('div');
    div.className = 'msg-assistant';
    div.innerHTML = `
      ${filterHTML}
      <div class="recommendation-box">${escHtml(recommendation)}</div>
      ${carsHTML}
    `;
    chatInner.insertBefore(div, typingEl);
    scrollBottom();
  }

  function carCardHTML(car) {
    const price = `${formatPrice(car.starting_price)} – ${formatPrice(car.ending_price)}`;
    const tags = [car.fuel_type, car.body_type, car.transmission_type, `${car.seating_capacity} seats`]
      .map(t => `<span class="car-tag">${t}</span>`).join('');
    return `
      <div class="car-card">
        <div>
          <div class="car-name">${escHtml(car.car_name)}</div>
          <div class="car-price">${price}</div>
        </div>
        ${stars(car.rating)}
        <div class="car-tags">${tags}</div>
        <div class="car-meta">
          <span>${car.max_power_bhp} bhp</span>
          <span>${car.fuel_tank_capacity}L</span>
        </div>
      </div>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── send logic ────────────────────────────────────────────────────────────

  async function send(query) {
    query = query.trim();
    if (!query || loading) return;

    loading = true;
    sendBtn.disabled = true;
    input.value = '';
    autoResize();

    appendUserMsg(query);
    typingEl.classList.add('visible');
    scrollBottom();

    try {
      const res = await fetch('/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      typingEl.classList.remove('visible');
      appendAssistant(data);
    } catch (err) {
      typingEl.classList.remove('visible');
      appendError('Something went wrong: ' + err.message);
    } finally {
      loading = false;
      sendBtn.disabled = !input.value.trim();
      input.focus();
    }
  }

  // ── auto-resize textarea ──────────────────────────────────────────────────

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 110) + 'px';
  }

  input.addEventListener('input', () => {
    autoResize();
    sendBtn.disabled = !input.value.trim() || loading;
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send(input.value);
    }
  });

  sendBtn.addEventListener('click', () => send(input.value));

  suggestions.addEventListener('click', (e) => {
    const chip = e.target.closest('.suggestion-chip');
    if (chip) send(chip.textContent);
  });

})();
</script>
</body>
</html>
